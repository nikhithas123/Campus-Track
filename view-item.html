<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lost Items - CampusTrack</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f4f7fb;
}

.header {
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  padding: 25px;
  border-radius: 0 0 20px 20px;
}

.item-card {
  border-radius: 16px;
  border: none;
  transition: 0.25s;
}

.item-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}

.item-img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
<span class="navbar-brand">CampusTrack</span>
<button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
</nav>

<div class="header text-center">
<h2>Reported Lost Items 🔍</h2>
<p class="mb-0">Live data from CampusTrack</p>
</div>

<div class="container mt-5 mb-5">

<!-- SINGLE ITEM -->
<div id="singleItemView" style="display:none;" class="mb-4"></div>

<!-- MATCHES -->
<div id="matchSection" style="display:none;" class="mb-4">
<h4>🎯 Possible Matches</h4>
<div id="matches"></div>
</div>

<!-- CHAT -->
<div id="chatSection" style="display:none;" class="mb-4">
<h4>💬 Chat</h4>

<div id="chatBox" style="height:200px;overflow:auto;border:1px solid #ccc;padding:10px;background:white;"></div>

<div class="d-flex mt-2">
<input id="messageInput" class="form-control" placeholder="Type message">
<button class="btn btn-success ms-2" onclick="sendMessage()">Send</button>
</div>

</div>

<!-- LIST -->
<div class="row g-4" id="itemsContainer"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="js/firebase.js"></script>
<script src="js/match.js"></script>
<script src="js/chat.js"></script>

<script>

let userRole="student";

const params = new URLSearchParams(window.location.search);
const selectedId = params.get("id");

auth.onAuthStateChanged(async (user)=>{

if(!user){
window.location.href="login.html";
return;
}

const doc=await db.collection("users").doc(user.uid).get();

if(doc.exists){
userRole=doc.data().role;
}

loadItems();

});

function logout(){
auth.signOut().then(()=>{
window.location.href="login.html";
});
}

function loadItems(){

const container=document.getElementById("itemsContainer");

db.collection("lostItems")
.orderBy("createdAt","desc")
.onSnapshot((snapshot)=>{

container.innerHTML="";

if(snapshot.empty){
container.innerHTML=`<div class="text-center text-muted">No lost items reported yet.</div>`;
return;
}

snapshot.forEach(async (doc)=>{

const item=doc.data();
const id=doc.id;

// ✅ SINGLE ITEM VIEW
if(selectedId && selectedId === id){

container.style.display="none";

const singleView = document.getElementById("singleItemView");
singleView.style.display="block";

singleView.innerHTML = `
<div class="card p-3 shadow">

<h3>${item.itemName}</h3>

<p><strong>Category:</strong> ${item.category}</p>
<p><strong>Location:</strong> ${item.location}</p>
<p>${item.description}</p>

<button class="btn btn-primary"
onclick="startChat('${id}','${item.userId}')">
Request Chat
</button>

<button class="btn btn-secondary mt-2"
onclick="window.location.href='view-item.html'">
Back
</button>

</div>
`;

// ✅ MATCHING
const matches = await findMatches(item);

const matchDiv = document.getElementById("matches");
const matchSection = document.getElementById("matchSection");

matchSection.style.display="block";
matchDiv.innerHTML="";

matches.slice(0,3).forEach(m=>{
matchDiv.innerHTML += `
<div class="card p-2 mb-2">
<b>${m.data.itemName}</b>
<p>${m.data.location}</p>
<p style="color:green;">
Match: ${(m.score*100).toFixed(0)}%
</p>
</div>
`;
});

// ✅ SHOW CHAT
document.getElementById("chatSection").style.display="block";

return;
}

// LIST VIEW
const image=item.imageUrl ?
`<img src="${item.imageUrl}" class="item-img">`
:
`<div class="bg-light text-center p-5 rounded mb-2">No Image</div>`;

container.innerHTML+=`

<div class="col-md-4">
<div class="card item-card p-3 shadow-sm">

${image}

<h5>${item.itemName}</h5>

<p><strong>Category:</strong> ${item.category}</p>
<p><strong>Location:</strong> ${item.location}</p>
<p class="text-muted">${item.description}</p>

<span class="badge bg-warning text-dark mb-2">
${item.status}
</span>

<button class="btn btn-primary btn-sm"
onclick="viewItem('${id}')">
View Details
</button>

${userRole==="admin" ? `
<div class="d-flex gap-2 mt-2">
<button class="btn btn-success btn-sm" onclick="markFound('${id}')">Mark Found</button>
<button class="btn btn-secondary btn-sm" onclick="markPending('${id}')">Pending</button>
</div>
` : ""}

</div>
</div>

`;

});

});

}

function viewItem(id){
window.location.href=`view-item.html?id=${id}`;
}

function markFound(id){
db.collection("lostItems").doc(id).update({ status:"Found" });
}

function markPending(id){
db.collection("lostItems").doc(id).update({ status:"Pending" });
}

// ❌ REMOVED YOUR OLD startChat (IMPORTANT)
// ✅ Using startChat from chat.js

</script>

</body>
</html>
