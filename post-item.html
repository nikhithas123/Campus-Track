<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Lost Item - CampusTrack</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
font-family:'Segoe UI',sans-serif;
background:#f4f7fb;
}

.header{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
padding:25px;
border-radius:0 0 20px 20px;
}

.form-card{
border-radius:18px;
border:none;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.preview-img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
margin-top:10px;
display:none;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
<span class="navbar-brand">CampusTrack</span>
<button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
</nav>

<div class="header text-center">
<h2>Report Lost Item 📦</h2>
<p class="mb-0">Help us locate your lost belonging</p>
</div>

<div class="container mt-5 mb-5">
<div class="card form-card shadow">

<div class="mb-3">
<label class="form-label">Item Name</label>
<input type="text" id="itemName" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Category</label>
<select id="category" class="form-select">
<option>Electronics</option>
<option>ID Card</option>
<option>Bag</option>
<option>Other</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Last Seen Location</label>
<input type="text" id="location" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<textarea id="description" class="form-control" rows="3"></textarea>
</div>

<div class="mb-3">
<label class="form-label">Upload Item Image</label>
<input type="file" id="itemImage" class="form-control" accept="image/*">
<img id="preview" class="preview-img">
</div>

<button class="btn btn-primary w-100" onclick="submitItem()">
Submit Report
</button>

</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="js/firebase.js"></script>
<script src="js/match.js"></script>

<script>

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

/* AUTH CHECK */
auth.onAuthStateChanged((user)=>{
if(!user){
window.location.href="login.html";
return;
}
currentUser = user;
});

/* LOGOUT */
function logout(){
auth.signOut().then(()=>{
window.location.href="login.html";
});
}

/* IMAGE PREVIEW */
document.getElementById("itemImage").addEventListener("change",(e)=>{

const file = e.target.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(event){
const img = document.getElementById("preview");
img.src = event.target.result;
img.style.display = "block";
};

reader.readAsDataURL(file);

}

});

/* NOTIFICATION */
function showNotification(msg){

const div = document.createElement("div");

div.innerText = msg;

div.style.position="fixed";
div.style.bottom="20px";
div.style.right="20px";
div.style.background="#007bff";
div.style.color="white";
div.style.padding="10px";
div.style.borderRadius="8px";

document.body.appendChild(div);

setTimeout(()=>{ div.remove(); },3000);
}

/* SUBMIT ITEM */
async function submitItem(){

const itemName = document.getElementById("itemName").value.trim();
const category = document.getElementById("category").value;
const location = document.getElementById("location").value.trim();
const description = document.getElementById("description").value.trim();
const imageFile = document.getElementById("itemImage").files[0];

if(!itemName || !location || !description){
alert("Please fill all fields");
return;
}

try{

let imageUrl = "";

/* IMAGE UPLOAD (OPTIONAL) */
if(imageFile){

const formData = new FormData();
formData.append("file", imageFile);
formData.append("upload_preset", "campustrack_upload");

const response = await fetch(
"https://api.cloudinary.com/v1_1/dhh25uhii/image/upload",
{
method:"POST",
body:formData
});

const data = await response.json();

if(data.secure_url){
imageUrl = data.secure_url;
}else{
showNotification("⚠ Image upload failed");
}

}

/* 🔥 FINAL FIXED FIRESTORE SAVE */
await db.collection("lostItems").add({

userId: currentUser.uid,            // ✅ ADDED
userEmail: currentUser.email,

itemName: itemName,
category: category,
location: location,
description: description,

imageUrl: imageUrl || "",

status: "pending",                 // ✅ FIXED
createdAt: firebase.firestore.FieldValue.serverTimestamp()

});

/* MATCHING */
const newItem = {
itemName,
description,
location,
category,
userEmail: currentUser.email
};

const matches = await findMatches(newItem);

if(matches.length > 0){
showNotification("🎯 Matches found!");
}else{
showNotification("✅ Item reported successfully");
}

/* RESET */
document.getElementById("itemName").value="";
document.getElementById("location").value="";
document.getElementById("description").value="";
document.getElementById("itemImage").value="";
document.getElementById("preview").style.display="none";

}catch(error){

console.error(error);
alert("Error reporting item");

}

}

</script>

</body>
</html>
