<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Lost Reports</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f4f7fb;
}

.header {
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  padding: 25px;
  border-radius: 0 0 20px 20px;
}

.item-card {
  border-radius: 16px;
  border: none;
  transition: 0.25s;
}

.item-card:hover {
  transform: translateY(-5px);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">
  <span class="navbar-brand">Admin Panel</span>
  <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
</nav>

<!-- HEADER -->
<div class="header text-center">
  <h2>All Lost Reports 📦</h2>
  <p class="mb-0">Admin can monitor, update, or delete item status</p>
</div>

<!-- ITEMS -->
<div class="container mt-5 mb-5">
  <div class="row g-4" id="itemsContainer"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="js/firebase.js"></script>

<script>

// Admin protection
auth.onAuthStateChanged(async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const doc = await db.collection("users").doc(user.uid).get();

  if (!doc.exists || doc.data().role !== "admin") {
    alert("Admins only.");
    auth.signOut();
    window.location.href = "login.html";
    return;
  }

  loadItems();
});

// Logout
function logout() {
  auth.signOut().then(() => {
    window.location.href = "login.html";
  });
}

// Load items
function loadItems() {

  const container = document.getElementById("itemsContainer");

  db.collection("lostItems")
  .orderBy("createdAt","desc")
  .onSnapshot((snapshot)=>{

    container.innerHTML="";

    if(snapshot.empty){
      container.innerHTML=`<p class="text-center text-muted">No reports yet.</p>`;
      return;
    }

    snapshot.forEach((doc)=>{

      const item = doc.data();
      const id = doc.id;

      const image = item.imageUrl
        ? `<img src="${item.imageUrl}" class="img-fluid rounded mb-2" style="height:200px;width:100%;object-fit:cover;">`
        : "";

      const name = item.itemName || "Unknown Item";
      const userEmail = item.userEmail || "Unknown user";
      const category = item.category || "N/A";
      const location = item.location || "Not specified";
      const status = item.status || "Pending";

      container.innerHTML += `

      <div class="col-md-4">
        <div class="card item-card p-3 shadow-sm">

          ${image}

          <h5>${name}</h5>

          <p><strong>User:</strong> ${userEmail}</p>
          <p><strong>Category:</strong> ${category}</p>
          <p><strong>Location:</strong> ${location}</p>

          <span class="badge bg-warning text-dark mb-2">
            ${status}
          </span>

          <div class="d-flex gap-2">

            <button class="btn btn-success btn-sm"
            onclick="updateStatus('${id}','Found')">
            Mark Found
            </button>

            <button class="btn btn-secondary btn-sm"
            onclick="updateStatus('${id}','Pending')">
            Mark Pending
            </button>

            <button class="btn btn-danger btn-sm"
            onclick="deleteReport('${id}')">
            Delete
            </button>

          </div>

        </div>
      </div>

      `;

    });

  });

}

// Update status
function updateStatus(id,status){
  db.collection("lostItems").doc(id).update({
    status:status
  })
  .then(()=>{ console.log("Status updated"); })
  .catch((error)=>{ console.error(error); });
}

// Delete report
function deleteReport(id){
  if(confirm("Are you sure you want to delete this report?")){
    db.collection("lostItems").doc(id).delete()
    .then(()=>{ alert("Report deleted successfully"); })
    .catch((error)=>{ console.error(error); });
  }
}

</script>

</body>
</html>
