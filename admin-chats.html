<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Chat Monitor - CampusTrack</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
font-family:'Segoe UI',sans-serif;
background:#f4f7fb;
}

.header{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
padding:20px;
border-radius:0 0 20px 20px;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
<span class="navbar-brand">Admin Chat Panel</span>
<button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
</nav>

<div class="header text-center">
<h3>💬 All Chats Monitoring</h3>
</div>

<div class="container mt-4">
<div id="chatList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="js/firebase.js"></script>

<script>

auth.onAuthStateChanged(async user=>{

if(!user){
window.location.href="login.html";
return;
}

const doc = await db.collection("users").doc(user.uid).get();

if(!doc.exists || doc.data().role !== "admin"){
alert("Admins only");
auth.signOut();
return;
}

loadChats();

});

function logout(){
auth.signOut().then(()=>window.location.href="login.html");
}

function loadChats(){

db.collection("chats")
.orderBy("createdAt","desc")
.onSnapshot(snapshot=>{

const div = document.getElementById("chatList");
div.innerHTML="";

snapshot.forEach(doc=>{

const chat = doc.data();

div.innerHTML += `
<div class="card p-3 mb-3 shadow-sm">

<p><b>Chat ID:</b> ${doc.id}</p>
<p><b>Users:</b> ${chat.users.join(", ")}</p>

<button class="btn btn-primary btn-sm"
onclick="viewMessages('${doc.id}')">
View Messages
</button>

<button class="btn btn-danger btn-sm"
onclick="blockChat('${doc.id}')">
Block Chat
</button>

</div>
`;

});

});

}

function viewMessages(chatId){

db.collection("chats")
.doc(chatId)
.collection("messages")
.orderBy("createdAt")
.get()
.then(snapshot=>{

let msgs="";

snapshot.forEach(doc=>{
msgs += "• " + doc.data().text + "\n";
});

alert(msgs || "No messages");

});

}

function blockChat(chatId){

db.collection("chats").doc(chatId).update({
blocked:true
}).then(()=>{
alert("Chat blocked");
});

}

</script>

</body>
</html>
