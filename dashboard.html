<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard - CampusTrack</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f4f7fb;
}

/* Header gradient */
.dashboard-header {
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  padding: 30px;
  border-radius: 0 0 20px 20px;
}

/* Cards */
.feature-card {
  border: none;
  border-radius: 16px;
  transition: 0.25s;
}

.feature-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">
  <span class="navbar-brand mb-0 h1">CampusTrack</span>
  <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
</nav>

<!-- HEADER -->
<div class="dashboard-header text-center">
  <h2>Welcome Student 🎓</h2>
  <p class="mb-0">CampusTrack Intelligent Lost & Found System</p>
</div>

<!-- CONTENT -->
<div class="container mt-5">

  <div class="row g-4">

    <!-- Report Lost Item -->
    <div class="col-md-4">
      <div class="card feature-card p-4 shadow-sm text-center">
        <h5>📦 Report Lost Item</h5>
        <p class="text-muted">Submit details of your lost item.</p>
        <a href="post-item.html" class="btn btn-primary btn-sm">Report</a>
      </div>
    </div>

    <!-- Browse Found Items -->
    <div class="col-md-4">
      <div class="card feature-card p-4 shadow-sm text-center">
        <h5>🔍 Browse Found Items</h5>
        <p class="text-muted">Check if your item is found.</p>
        <a href="browse-items.html" class="btn btn-success btn-sm">Browse</a>
      </div>
    </div>

    <!-- My Reports -->
    <div class="col-md-4">
      <div class="card feature-card p-4 shadow-sm text-center">
        <h5>👤 My Reports</h5>
        <p class="text-muted">View your submitted items.</p>
        <a href="my-reports.html" class="btn btn-dark btn-sm">View</a>
      </div>
    </div>

  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="js/firebase.js"></script>

<script>

const db = firebase.firestore();

/* Protect page */
auth.onAuthStateChanged((user) => {
  if (!user) {
    window.location.href = "login.html";
  }
});

/* Logout */
function logout() {
  auth.signOut().then(() => {
    window.location.href = "login.html";
  });
}

/* 🔔 NOTIFICATION SYSTEM */
auth.onAuthStateChanged(user => {

  if (!user) return;

  db.collection("chats")
  .where("users", "array-contains", user.uid)
  .onSnapshot(snapshot => {

    snapshot.docChanges().forEach(change => {

      if (change.type === "modified") {
        showNotification("💬 New message received!");
      }

    });

  });

});

/* 🔔 POPUP UI */
function showNotification(msg){

  const div = document.createElement("div");

  div.innerText = msg;

  div.style.position = "fixed";
  div.style.bottom = "20px";
  div.style.right = "20px";
  div.style.background = "#28a745";
  div.style.color = "white";
  div.style.padding = "12px";
  div.style.borderRadius = "10px";
  div.style.boxShadow = "0 5px 15px rgba(0,0,0,0.2)";
  div.style.zIndex = "999";

  document.body.appendChild(div);

  setTimeout(() => {
    div.remove();
  }, 3000);

}

</script>

</body>
</html>
